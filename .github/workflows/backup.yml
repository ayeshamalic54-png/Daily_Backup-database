name: Neon Backup

on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create backup folder
        run: mkdir -p backups

      - name: Run pg_dump using official Postgres 17 image
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          docker run --rm \
            -e PGPASSWORD=$(echo "$DATABASE_URL" | sed -n 's/.*:\/\/.*:\(.*\)@.*/\1/p') \
            postgres:17 \
            bash -c "pg_dump '$DATABASE_URL' > /tmp/backup.sql && cat /tmp/backup.sql" \
            > backups/backup.sql

      - name: Rename backup
        run: |
          mv backups/backup.sql backups/backup-$(date +%Y-%m-%d-%H-%M).sql

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neon-backup
          path: backups/
